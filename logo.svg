<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 290" fill="none">
  <defs>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B8A"/>
      <stop offset="100%" stop-color="#FF4D6A"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9F43"/>
      <stop offset="100%" stop-color="#FF7B2E"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="bar5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9F43"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="30%" stop-color="#06B6D4"/>
      <stop offset="60%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>

  <!-- Bars — centered around x=200 -->
  <rect x="95" y="100" width="28" height="65" rx="4" fill="url(#bar1)"/>
  <rect x="131" y="60" width="28" height="105" rx="4" fill="url(#bar2)"/>
  <rect x="167" y="20" width="28" height="145" rx="4" fill="url(#bar3)"/>
  <rect x="203" y="40" width="28" height="125" rx="4" fill="url(#bar4)"/>
  <rect x="239" y="5" width="28" height="160" rx="4" fill="url(#bar5)"/>

  <!-- Wave line — centered -->
  <path d="M87 150 C107 150, 117 130, 137 125 C157 120, 167 145, 187 155 C207 165, 222 120, 242 110 C262 100, 272 135, 287 140"
        stroke="url(#wave)" stroke-width="4.5" fill="none" stroke-linecap="round"/>

  <!-- Nodes on wave -->
  <circle cx="109" cy="141" r="5.5" fill="#8B5CF6"/>
  <circle cx="145" cy="123" r="5.5" fill="#06B6D4"/>
  <circle cx="187" cy="155" r="5.5" fill="#22D3EE"/>
  <circle cx="231" cy="115" r="5.5" fill="#22D3EE"/>
  <circle cx="275" cy="135" r="5.5" fill="#34D399"/>

  <!-- Green swoosh at end -->
  <path d="M257 120 C272 105, 282 125, 293 130 C300 133, 300 112, 307 105"
        stroke="#34D399" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <circle cx="307" cy="105" r="4.5" fill="#34D399"/>

  <!-- PLOTNODE text -->
  <text x="200" y="235" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="48" letter-spacing="6" fill="#8B5CF6">PLOTNODE</text>
</svg>
