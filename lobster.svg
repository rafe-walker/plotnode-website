<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Body -->
  <ellipse cx="60" cy="62" rx="22" ry="26" fill="#E74C3C"/>
  <ellipse cx="60" cy="62" rx="22" ry="26" fill="url(#lobsterGrad)" opacity="0.6"/>

  <!-- Tail segments -->
  <ellipse cx="60" cy="90" rx="14" ry="6" fill="#C0392B"/>
  <ellipse cx="60" cy="98" rx="10" ry="5" fill="#C0392B"/>
  <path d="M50 102 Q55 112 60 108 Q65 112 70 102" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>

  <!-- Head -->
  <ellipse cx="60" cy="40" rx="16" ry="12" fill="#E74C3C"/>

  <!-- Eyes -->
  <circle cx="52" cy="35" r="4.5" fill="#2C3E50"/>
  <circle cx="68" cy="35" r="4.5" fill="#2C3E50"/>
  <circle cx="53" cy="33.5" r="2" fill="white"/>
  <circle cx="69" cy="33.5" r="2" fill="white"/>

  <!-- Eye stalks -->
  <rect x="50" y="26" width="4" height="8" rx="2" fill="#C0392B"/>
  <rect x="66" y="26" width="4" height="8" rx="2" fill="#C0392B"/>

  <!-- Antennae -->
  <path d="M54 28 Q48 14 36 10" stroke="#E74C3C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M66 28 Q72 14 84 10" stroke="#E74C3C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="36" cy="10" r="2.5" fill="#FF6B6B"/>
  <circle cx="84" cy="10" r="2.5" fill="#FF6B6B"/>

  <!-- Smile -->
  <path d="M54 42 Q60 48 66 42" stroke="#2C3E50" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Left claw arm -->
  <path d="M38 55 Q28 48 22 42" stroke="#E74C3C" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Left claw -->
  <path d="M22 42 Q14 34 10 38 Q14 44 22 42Z" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>
  <path d="M22 42 Q18 48 14 46 Q16 40 22 42Z" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>

  <!-- Right claw arm -->
  <path d="M82 55 Q92 48 98 42" stroke="#E74C3C" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Right claw -->
  <path d="M98 42 Q106 34 110 38 Q106 44 98 42Z" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>
  <path d="M98 42 Q102 48 106 46 Q104 40 98 42Z" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>

  <!-- Legs -->
  <path d="M40 65 L28 72" stroke="#C0392B" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M40 72 L30 80" stroke="#C0392B" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M80 65 L92 72" stroke="#C0392B" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M80 72 L90 80" stroke="#C0392B" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Body segments (subtle lines) -->
  <path d="M42 58 Q60 54 78 58" stroke="#C0392B" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M40 66 Q60 62 80 66" stroke="#C0392B" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M42 74 Q60 70 78 74" stroke="#C0392B" stroke-width="0.8" fill="none" opacity="0.5"/>

  <defs>
    <linearGradient id="lobsterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
  </defs>
</svg>
